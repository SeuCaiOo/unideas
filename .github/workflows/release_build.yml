name: Android Release

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      release_notes:
        required: false
        type: string
        default: 'Melhorias e correções gerais'
  workflow_dispatch:
    inputs:
      version:
        description: 'Tag existente para rodar o build/release (ex: 0.0.1, sem o "v")'
        required: true
        type: string
      release_notes:
        description: 'Novidades desta versão (aparece no Firebase App Distribution)'
        required: false
        type: string
        default: 'Melhorias e correções gerais'

jobs:
  build-and-release:
    name: Build Signed Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: refs/tags/v${{ inputs.version }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode Google Services JSON
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" | base64 -d > app/google-services.json

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > "${{ github.workspace }}/release.jks"

      - name: Build Release APK
        env:
          STORE_FILE_PATH: ${{ github.workspace }}/release.jks
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          files: app/build/outputs/apk/release/app-release.apk
          draft: true
          prerelease: false
          generate_release_notes: true

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          token: ${{ secrets.FIREBASE_TOKEN }}
          groups: alpha-testers
          file: app/build/outputs/apk/release/app-release.apk
          releaseNotes: "${{ inputs.release_notes }}"
