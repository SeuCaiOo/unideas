name: Android Quality (Dev)

on:
  pull_request:
    branches: [ "dev" ]

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ==========================================
  # JOB 1: Code Quality (Detekt)
  # ==========================================
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create Google Services JSON
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" | base64 -d > app/google-services.json

      - name: Run Detekt
        run: ./gradlew detekt

      - name: Upload Detekt Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-reports
          path: |
            **/build/reports/detekt/
          retention-days: 7

      - name: Comment PR with Detekt Results
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ Detekt found issues! Check the artifacts for details.'
            })

  # ==========================================
  # JOB 2: Build Debug APK
  # ==========================================
  build:
    name: Build Debug App
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create Google Services JSON
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" | base64 -d > app/google-services.json

      - name: Build with Gradle
        run: ./gradlew assembleDebug

  # ==========================================
  # JOB 3: Test Coverage (Kover)
  # ==========================================
  coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create Google Services JSON
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" | base64 -d > app/google-services.json

      - name: Run Kover verification
        run: ./gradlew koverVerify

      - name: Upload Kover Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kover-reports
          path: |
            **/build/reports/kover/
          retention-days: 7

      - name: Comment PR with Coverage Results
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ Test coverage below the minimum! Check the Kover report in the artifacts.'
            })

  # ==========================================
  # JOB 4: Quality Gate (Final Check)
  # ==========================================
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [code-quality, build, coverage]
    if: always()

    steps:
      - name: Check All Jobs
        run: |
          if [[ "${{ needs.code-quality.result }}" != "success" ]] || \
          [[ "${{ needs.build.result }}" != "success" ]] || \
          [[ "${{ needs.coverage.result }}" != "success" ]]; then
            echo "❌ Quality gate failed!"
            exit 1
          fi
          echo "✅ All checks passed!"
