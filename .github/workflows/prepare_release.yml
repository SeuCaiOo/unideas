name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      release_notes:
        description: 'Novidades desta versão (aparece no Firebase App Distribution)'
        required: false
        type: string
        default: 'Melhorias e correções gerais'

jobs:
  bump-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_version: ${{ steps.version.outputs.new_version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set up Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Calculate new version
        id: version
        run: |
          CURRENT=$(grep 'versionName = ' app/build.gradle.kts | awk -F'"' '{print $2}')
          MAJOR=$(echo $CURRENT | cut -d. -f1)
          MINOR=$(echo $CURRENT | cut -d. -f2)
          PATCH=$(echo $CURRENT | cut -d. -f3)

          case "${{ inputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Bumping $CURRENT → $NEW_VERSION"

      - name: Update build.gradle.kts
        run: |
          NEW_VERSION="${{ steps.version.outputs.new_version }}"
          CURRENT_CODE=$(grep 'versionCode =' app/build.gradle.kts | awk '{print $3}')
          NEW_CODE=$((CURRENT_CODE + 1))

          sed -i "s/versionName = \".*\"/versionName = \"$NEW_VERSION\"/" app/build.gradle.kts
          sed -i "s/versionCode = .*/versionCode = $NEW_CODE/" app/build.gradle.kts

          echo "versionName = $NEW_VERSION, versionCode = $NEW_CODE"

      - name: Commit and Push Changes
        run: |
          git add app/build.gradle.kts
          git commit -m "chore: bump version to ${{ steps.version.outputs.new_version }}"
          git push origin HEAD:${{ github.ref_name }}

      - name: Create and Push Tag
        run: |
          TAG_NAME="v${{ steps.version.outputs.new_version }}"
          git tag $TAG_NAME
          git push origin $TAG_NAME

  build-and-release:
    needs: bump-version
    permissions:
      contents: write
    uses: ./.github/workflows/release_build.yml
    with:
      version: ${{ needs.bump-version.outputs.new_version }}
      release_notes: ${{ inputs.release_notes }}
    secrets: inherit
